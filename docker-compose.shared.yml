name: djaitin-shared

x-php-base: &php-base
  image: ${PHP_IMAGE:-laragon-php-stable:8.4}
  build:
    context: ../docker/php-stable
  restart: unless-stopped
  user: "1000:1000"
  working_dir: /var/www/html
  entrypoint: []
  depends_on:
    postgres:
      condition: service_healthy

x-laravel-command: &laravel-command >-
  sh -lc "set -e; if [ ! -f vendor/autoload.php ]; then if command -v composer >/dev/null 2>&1; then composer install --no-interaction --prefer-dist --no-progress; else echo 'composer not found in PHP image and vendor/autoload.php is missing'; exit 1; fi; fi; mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache; exec php-fpm -F"

services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-djaitin}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - djaitin_shared_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - djaitin_net

    const mainNavItems: NavItem[] = [
        {
            title: 'Dashboard',
            href: office.dashboard.url(),
            icon: LayoutDashboard,
            group: 'Utama',
        },
        {
            title: 'Pelanggan',
            href: office.customers.index.url(),
            icon: Users,
            group: 'Operasional',
        },
        {
            title: 'Pesanan',
            href: office.orders.index.url(),
            icon: ClipboardList,
            group: 'Operasional',
        },
        {
            title: 'Pembayaran',
            href: office.payments.index.url(),
            icon: CreditCard,
            group: 'Operasional',
        },
        {
            title: 'Pengiriman',
            href: office.shipments.index.url(),
            icon: PackageCheck,
            group: 'Operasional',
        },
        {
            title: 'Produksi',
            href: office.production.index.url(),
            icon: Layers3,
            group: 'Operasional',
        },
        {
            title: 'Katalog',
            href: office.catalogs.index.url(),
            icon: Archive,
            group: 'Inventaris',
        },
        {
            title: 'Diskon',
            href: office.discounts.index.url(),
            icon: Tag,
            group: 'Inventaris',
        },
    ];
    volumes:
      - /home/nabiil/Projects/djaitin:/var/www/html:z
    depends_on:
      app:
        condition: service_started
    command: >-
      sh -lc "while [ ! -f vendor/autoload.php ]; do sleep 2; done; php artisan queue:work --sleep=3 --tries=3 --timeout=90"
    networks:
      - djaitin_net

  scheduler:
    <<: *php-base
    env_file:
      - .env.docker
    environment:
      APP_URL: ${APP_URL:-http://localhost:8004}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-djaitin}
      DB_USERNAME: ${DB_USERNAME:-djaitin}
      DB_PASSWORD: ${DB_PASSWORD:-change_this_password}
      TMPDIR: /tmp
    volumes:
      - /home/nabiil/Projects/djaitin:/var/www/html:z
    depends_on:
      app:
        condition: service_started
    command: >-
      sh -lc "while [ ! -f vendor/autoload.php ]; do sleep 2; done; while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    networks:
      - djaitin_net

volumes:
  djaitin_shared_pg_data:

networks:
  djaitin_net:
