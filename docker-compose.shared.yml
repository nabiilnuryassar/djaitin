name: djaitin-shared

x-php-base: &php-base
  image: ${PHP_IMAGE:-laragon-php-stable:8.4}
  build:
    context: ../docker/php-stable
  restart: unless-stopped
  working_dir: /var/www/html
  entrypoint: []
  depends_on:
    postgres:
      condition: service_healthy

x-laravel-command: &laravel-command >-
  sh -lc "set -e; if [ ! -f vendor/autoload.php ]; then if command -v composer >/dev/null 2>&1; then composer install --no-interaction --prefer-dist --no-progress; else echo 'composer not found in PHP image and vendor/autoload.php is missing'; exit 1; fi; fi; exec php-fpm -F"

services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-djaitin}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - djaitin_shared_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - djaitin_net

  app:
    <<: *php-base
    env_file:
      - .env.docker
    environment:
      APP_URL: ${APP_URL:-http://localhost:8004}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-djaitin}
      DB_USERNAME: ${DB_USERNAME:-djaitin}
      DB_PASSWORD: ${DB_PASSWORD:-change_this_password}
    volumes:
      - /home/nabiil/Projects/djaitin:/var/www/html:z
      - djaitin_shared_vendor:/var/www/html/vendor

    command: *laravel-command
    networks:
      - djaitin_net

  nginx:
    image: nginx:1.31.0-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8004}:80"
    volumes:
      - /home/nabiil/Projects/djaitin/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,z
      - /home/nabiil/Projects/djaitin/public:/var/www/html/public:ro,z
    networks:
      - djaitin_net

  worker:
    <<: *php-base
    env_file:
      - .env.docker
    environment:
      APP_URL: ${APP_URL:-http://localhost:8004}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-djaitin}
      DB_USERNAME: ${DB_USERNAME:-djaitin}
      DB_PASSWORD: ${DB_PASSWORD:-change_this_password}
    volumes:
      - /home/nabiil/Projects/djaitin:/var/www/html:z
      - djaitin_shared_vendor:/var/www/html/vendor

    depends_on:
      app:
        condition: service_started
    command: >-
      sh -lc "while [ ! -f vendor/autoload.php ]; do sleep 2; done; php artisan queue:work --sleep=3 --tries=3 --timeout=90"
    networks:
      - djaitin_net

  scheduler:
    <<: *php-base
    env_file:
      - .env.docker
    environment:
      APP_URL: ${APP_URL:-http://localhost:8004}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-djaitin}
      DB_USERNAME: ${DB_USERNAME:-djaitin}
      DB_PASSWORD: ${DB_PASSWORD:-change_this_password}
    volumes:
      - /home/nabiil/Projects/djaitin:/var/www/html:z
      - djaitin_shared_vendor:/var/www/html/vendor

    depends_on:
      app:
        condition: service_started
    command: >-
      sh -lc "while [ ! -f vendor/autoload.php ]; do sleep 2; done; while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    networks:
      - djaitin_net

volumes:
  djaitin_shared_pg_data:
  djaitin_shared_vendor:

networks:
  djaitin_net:
